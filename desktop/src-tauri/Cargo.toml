[package]
name = "video-notes-ai"
version = "1.2.0"
edition = "2021"
description = "Video Notes AI — AI-powered video transcription and note generation"
authors = ["Video Notes AI Team"]
license = "MIT"

[package.metadata]
"software.repository" = "https://github.com/example/video-notes-ai"

[package.metadata.tauri-winres]
"OriginalFilename" = "Video Notes AI.exe"
"ProductName" = "Video Notes AI"
"FileVersion" = "1.2.0"
"ProductVersion" = "1.2.0"
"FileDescription" = "Video Notes AI"

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-shell = "2"
tauri-plugin-dialog = "2"
tauri-plugin-notification = "2"
tauri-plugin-clipboard-manager = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
process-wrap = { version = "9", features = ["job-object", "tokio1"] }
uuid = { version = "1", features = ["v4"] }
chrono = "0.4"
log = "0.4"
env_logger = "0.11"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
