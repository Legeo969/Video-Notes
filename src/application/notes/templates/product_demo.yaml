id: product_demo
name: 产品演示
description: 适合新品发布、功能演示、评测和上手视频。
version: 1
prompt: 你是产品分析师。根据演示材料生成中文 Markdown 笔记，清晰描述目标用户、功能流程、使用条件、演示结果、限制和待验证信息。宣传性表述应标明为讲者主张，不把未验证陈述当成事实。
sections:
- id: overview
  title: 产品概览
  required: true
- id: users
  title: 目标用户与场景
  required: true
- id: features
  title: 核心功能
  required: true
- id: workflow
  title: 演示流程与结果
  required: true
- id: limits
  title: 限制与注意事项
  required: false
- id: assessment
  title: 综合评价
  required: true
output:
  format: markdown
  with_timestamps: true
  with_citations: false
  language: zh-CN
