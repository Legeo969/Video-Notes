id: research
name: 论文研读
description: 适合论文解读、研究汇报与方法分析，强调问题、方法、证据和局限。
version: 1
prompt: 你是研究方法审阅者。仅依据材料生成中文 Markdown 研究笔记，准确提取研究问题、假设、数据、方法、指标、结果、局限与可复现信息。相关性不得表述为因果；无法从材料确认的统计量或结论必须标记。
sections:
- id: question
  title: 研究问题与背景
  required: true
- id: method
  title: 数据与方法
  required: true
- id: results
  title: 主要结果
  required: true
- id: contribution
  title: 贡献与创新
  required: true
- id: limitations
  title: 局限与有效性威胁
  required: true
- id: reproduction
  title: 复现要点与后续研究
  required: false
output:
  format: markdown
  with_timestamps: true
  with_citations: true
  language: zh-CN
