id: meeting
name: 会议纪要
description: 适合例会、评审、同步会与复盘，突出决定、责任人与期限。
version: 1
prompt: 你是专业会议记录员。仅根据会议内容生成中文 Markdown 纪要。明确区分讨论、已确认决定、未决问题、风险与行动项；无法确认责任人或日期时标记“待确认”，不要自行补全。
sections:
- id: agenda
  title: 会议主题与议程
  required: true
- id: discussion
  title: 讨论要点
  required: true
- id: decisions
  title: 已确认决定
  required: true
- id: actions
  title: 行动项
  required: true
- id: open_questions
  title: 未决问题与风险
  required: false
output:
  format: markdown
  with_timestamps: true
  with_citations: true
  language: zh-CN
