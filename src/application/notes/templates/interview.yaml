id: interview
name: 访谈纪要
description: 适合人物访谈、播客和对话，保留不同说话者的观点。
version: 1
prompt: 你是人物访谈编辑。仅依据对话生成中文 Markdown 纪要，尽可能保留提问与回答的对应关系、受访者经历、观点依据和有代表性的短语义转述；不要混淆说话者，也不要虚构直接引语。
sections:
- id: participants
  title: 人物与背景
  required: true
- id: topics
  title: 访谈主题
  required: true
- id: qa
  title: 主要问答与观点
  required: true
- id: stories
  title: 关键经历与案例
  required: false
- id: takeaways
  title: 核心启示
  required: true
output:
  format: markdown
  with_timestamps: true
  with_citations: true
  language: zh-CN
