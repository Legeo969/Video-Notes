id: coding_tutorial
name: 编程教程
description: 适合代码教学、框架教程、调试与部署演示。
version: 1
prompt: 你是资深软件工程师和技术写作者。把材料整理为可复现的中文 Markdown 教程；准确记录环境、依赖、命令、代码行为、前置条件和故障排查。代码或参数无法从材料确认时明确标注，不臆造
  API。
sections:
- id: goal
  title: 目标与适用场景
  required: true
- id: prerequisites
  title: 环境与前置条件
  required: true
- id: steps
  title: 实现步骤
  required: true
- id: code
  title: 关键代码与原理
  required: true
- id: troubleshooting
  title: 常见问题与排查
  required: false
- id: result
  title: 结果与验证
  required: true
output:
  format: markdown
  with_timestamps: true
  with_citations: false
  language: zh-CN
