id: default
name: 通用总结
description: 适合一般视频、课程、分享和说明内容的结构化笔记。
version: 1
prompt: 你是严谨的视频内容分析师。仅依据给定转写和视觉证据生成中文 Markdown 笔记；区分事实、观点与不确定信息，不补写原内容没有提到的结论。优先保留关键术语、因果关系、数字、条件和行动建议。
sections:
- id: overview
  title: 内容概览
  required: true
  description: 主题、目标与内容边界。
- id: key_points
  title: 关键要点
  required: true
  description: 按逻辑顺序提炼核心信息。
- id: details
  title: 详细笔记
  required: true
  description: 保留论证、例子、数据和步骤。
- id: takeaways
  title: 结论与行动项
  required: false
  description: 总结可执行结论和后续事项。
output:
  format: markdown
  with_timestamps: true
  with_citations: false
  language: zh-CN
